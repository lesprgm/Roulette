services:
  - type: web
    name: non-deterministic-website
    runtime: python
    plan: free
    autoDeploy: true
    buildCommand: |
      python -m pip install --upgrade pip
      python -m pip install -r requirements.txt
      npm ci
      npm run build
      npm prune --omit=dev
    startCommand: bash -lc "python -m pip install -r requirements.txt && python -m uvicorn api.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_GENERATION_MODEL
        value: gemini-3.5-flash
      - key: GEMINI_FALLBACK_MODEL
        value: gemini-3-flash-preview
      - key: GEMINI_MAX_OUTPUT_TOKENS
        value: '64000'
      - key: GEMINI_PREMIUM_BUILD_MAX_OUTPUT_TOKENS
        value: '64000'
      - key: GEMINI_THINKING_LEVEL
        value: medium
      - key: BURST_SITE_COUNT
        value: '10'
      - key: TEMPERATURE
        value: '1.2'
      - key: LLM_MAX_TOKENS
        value: '15000'
      - key: LLM_TIMEOUT_SECS
        value: '105'
      - key: RATE_MAX_REQUESTS
        value: '30'
      - key: RATE_WINDOW_SECONDS
        value: '10800'
      - key: ALLOW_OFFLINE_GENERATION
        value: '0'
      - key: REDIS_URL
        sync: false
      - key: REDIS_COUNTER_KEY
        value: ndw:metrics:total
      - key: REDIS_COUNTER_TIMEOUT
        value: '2.0'
      - key: VARIANT_CATALOG_PATH
        value: /etc/secrets/variant_catalog.yaml
      - key: VARIANT_CATEGORY_WEIGHTS
        value: games=57,apps_low_friction=46,extras_active=38,toys=34,products=31,extras_ambient=7
      - key: PREFETCH_PREWARM_COUNT
        value: 0
      - key: PREFETCH_TOPUP_ENABLED
        value: '0'
      - key: PREFETCH_FILL_TO
        value: 75
      - key: PREFETCH_LOW_WATER
        value: 55
      - key: PREFETCH_TOKEN_SECRET
        sync: false
      - key: PREFETCH_TOKEN_TTL_SECONDS
        value: '1800'
      - key: PREFETCH_REVIEW_BATCH
        value: '20'
      - key: PREMIUM_QUEUE_ENABLED
        value: '1'
      - key: PREMIUM_TOPUP_ENABLED
        value: '0'
      - key: PREMIUM_FILL_TO
        value: '10'
      - key: PREMIUM_LOW_WATER
        value: '3'
      - key: PREMIUM_BATCH_SIZE
        value: '10'
      - key: PREMIUM_BURST_MIN_HTML_BYTES
        value: '3000'
      - key: PREFLIGHT_HTML_WARN_BYTES
        value: '180000'
      - key: PREFLIGHT_HTML_BLOCK_BYTES
        value: '280000'
      - key: STREAM_KEEPALIVE_SECONDS
        value: '8'
      - key: PREMIUM_TOKEN_TTL_SECONDS
        value: '900'
      - key: REDIS_DIVERSITY_ENABLED
        value: '1'
      - key: DIVERSITY_HTML_CACHE_TTL_SECONDS
        value: '604800'
      - key: DIVERSITY_FINGERPRINT_TTL_SECONDS
        value: '604800'
