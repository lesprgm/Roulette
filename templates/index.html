<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Non-Deterministic Website</title>

  <link rel="stylesheet" href="/static/design-kit/fonts.css" />
  <link rel="stylesheet" href="/tailwind.css" />
  <link rel="stylesheet" href="/css/style.css" />

  <!-- Speed up module startup for the 3D tunnel -->
  <link rel="modulepreload" href="/static/vendor/three.module.js" />
  <link rel="modulepreload" href="/js/tunnel.js" />

  <!-- Tailwind Play (local) for runtime utility classes -->
  <script src="/static/vendor/tailwind-play.js"></script>
  <!-- Lucide Icons (local) -->
  <script src="/static/vendor/lucide.min.js"></script>
  <!-- GSAP (local) -->
  <script src="/static/vendor/gsap.min.js"></script>
  <!-- Three.js (local) -->
  <script type="importmap">
  {
    "imports": {
      "three": "/static/vendor/three.module.js",
      "three/addons/": "/static/vendor/three-addons/"
    }
  }
  </script>

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-C6E3TKE7QK"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag("js", new Date());
    gtag("config", "G-C6E3TKE7QK");
  </script>
</head>

<body class="ndw-base landing-mode" data-api-key="">
  <!-- 3D Tunnel Container (fixed behind content) -->
  <div id="tunnel-container" style="position: fixed; inset: 0; z-index: 0;"></div>

  <!-- Noise Overlay -->
  <div class="noise-overlay"></div>

  <!-- Shutter Transition -->
  <div id="shutter" class="shutter shutter-open" aria-hidden="true">
    <div class="shutter-panel shutter-top"></div>
    <div class="shutter-panel shutter-bottom"></div>
  </div>

  <!-- Cursor Glow -->
  <div id="cursor-glow"></div>

  <!-- Dynamic Background Blobs -->
  <div class="blob-cont">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <main id="appMain" class="w-full min-h-screen">
    <section class="hero-wrap" data-role="hero">
      <div class="container">
        <h1 class="hero-title" data-text="Roulette">
          <span class="hero-text">
            <span class="letter">R</span><span class="letter">o</span><span class="letter">u</span><span
              class="letter">l</span><span class="letter">e</span><span class="letter">t</span><span
              class="letter">t</span><span class="letter">e</span>
          </span>
        </h1>
        <p class="hero-sub">Random websites with every click.</p>
        <p class="hero-hint" id="heroHint">Click a preview to enter</p>
      </div>
      <div class="scroll-cue" id="scrollCue" aria-hidden="true">
        <span></span>
      </div>
    </section>
  </main>

  <!-- Hidden Buffer for Predictive UX (Double-Buffering) -->
  <div id="ndw-sandbox-buffer" class="fixed inset-0 pointer-events-none opacity-0 -z-10" aria-hidden="true">
    <!-- Next experience is pre-rendered here off-screen -->
  </div>
  <div id="ndwTestPreviewDock" class="ndw-test-preview-dock" hidden aria-hidden="true"></div>

  <!-- Load compiled TypeScript as ES modules -->
  <script type="module" src="/js/ndw.js"></script>
  <script type="module" src="/js/app.js"></script>

  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const testMode = params.has('ndw_test');
      if (testMode) {
        document.documentElement.setAttribute('data-ndw-test-mode', '1');
        return;
      }

      // ========== GSAP Timelines ==========
      const tl = gsap.timeline({ defaults: { ease: "power4.out" } });

      // Staggered Letter Animation
      tl.from(".letter", {
        y: 80,
        opacity: 0,
        rotateX: -90,
        stagger: 0.05,
        duration: 1,
        ease: "back.out(1.7)"
      })
        .from(".hero-sub", {
          y: 20,
          opacity: 0,
          duration: 0.8,
        }, "-=0.5");

      // ========== Ambient Blob Animation ==========
      function moveBlob(target) {
        gsap.to(target, {
          x: "random(-150, 150)",
          y: "random(-150, 150)",
          scale: "random(0.85, 1.15)",
          rotation: "random(-20, 20)",
          duration: "random(12, 22)",
          ease: "sine.inOut",
          onComplete: () => moveBlob(target)
        });
      }
      document.querySelectorAll('.blob').forEach(blob => moveBlob(blob));

      // ========== Cursor Glow Tracking ==========
      const cursorGlow = document.getElementById('cursor-glow');
      if (cursorGlow) {
        const xTo = gsap.quickTo(cursorGlow, "left", { duration: 0.6, ease: "power3" });
        const yTo = gsap.quickTo(cursorGlow, "top", { duration: 0.6, ease: "power3" });

        window.addEventListener('pointermove', (e) => {
          xTo(e.clientX);
          yTo(e.clientY);
        }, { passive: true });
      }
    })();
  </script>
</body>

</html>
